services:

  # ───────────────────────────────────────────────────────────────────────────
  # Infrastructure
  # ───────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: saas_postgres
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=300", "-c", "shared_buffers=128MB"]
    environment:
      POSTGRES_DB: saas_db
      POSTGRES_USER: saas_user
      POSTGRES_PASSWORD: saas_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_user -d saas_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: saas_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: saas_jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    depends_on:
      - postgres

  # ───────────────────────────────────────────────────────────────────────────
  # Application Services
  # Build context = project root so all services can access /shared
  # ───────────────────────────────────────────────────────────────────────────

  tenant-service:
    build:
      context: .
      dockerfile: tenant-service/Dockerfile
    container_name: saas_tenant_service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      SERVICE_NAME: tenant-service
      INTERNAL_SERVICE_TOKEN: internal_dev_token_change_in_prod
      JWT_SECRET: local_dev_jwt_secret_change_in_prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: saas_db
      DB_USER: app_user
      DB_PASSWORD: app_password
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: tenant-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    # container_name: saas_user_service
    deploy:
      replicas: 3
    restart: unless-stopped
    # ports:
    #   - "3002:3002"
    environment:
      PORT: 3002
      SERVICE_NAME: user-service
      INTERNAL_SERVICE_TOKEN: internal_dev_token_change_in_prod
      JWT_SECRET: local_dev_jwt_secret_change_in_prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: saas_db
      DB_USER: app_user
      DB_PASSWORD: app_password
      AUTH_DB_USER: auth_user
      AUTH_DB_PASSWORD: auth_password
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: user-service
    depends_on:
      postgres:
        condition: service_healthy

  billing-service:
    build:
      context: .
      dockerfile: billing-service/Dockerfile
    container_name: saas_billing_service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      SERVICE_NAME: billing-service
      INTERNAL_SERVICE_TOKEN: internal_dev_token_change_in_prod
      JWT_SECRET: local_dev_jwt_secret_change_in_prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: saas_db
      DB_USER: app_user
      DB_PASSWORD: app_password
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4000}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: billing-service
    depends_on:
      postgres:
        condition: service_healthy

  file-service:
    build:
      context: .
      dockerfile: file-service/Dockerfile
    container_name: saas_file_service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      SERVICE_NAME: file-service
      INTERNAL_SERVICE_TOKEN: internal_dev_token_change_in_prod
      JWT_SECRET: local_dev_jwt_secret_change_in_prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: saas_db
      DB_USER: app_user
      DB_PASSWORD: app_password
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_BUCKET: uploads
      MINIO_USE_SSL: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: file-service
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    # container_name: saas_gateway
    deploy:
      replicas: 3
    restart: unless-stopped
    # Exposing ports directly on replicas would cause conflicts. 
    # Traffic now goes through the Nginx load balancer.
    # ports:
    #   - "3000:3000"
    environment:
      PORT: 3000
      SERVICE_NAME: api-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: api-gateway
      INTERNAL_SERVICE_TOKEN: internal_dev_token_change_in_prod
      JWT_SECRET: local_dev_jwt_secret_change_in_prod
      TENANT_SERVICE_URL: http://tenant-service:3001
      USER_SERVICE_URL: http://user-service:3002
      BILLING_SERVICE_URL: http://billing-service:3003
      FILE_SERVICE_URL: http://file-service:3004
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: saas_db
      DB_USER: app_user
      DB_PASSWORD: app_password
    depends_on:
      redis:
        condition: service_healthy
      tenant-service:
        condition: service_started
      user-service:
        condition: service_started
      billing-service:
        condition: service_started
      file-service:
        condition: service_started

  worker-service:
    build:
      context: .
      dockerfile: worker-service/Dockerfile
    container_name: saas_worker
    restart: unless-stopped
    environment:
      SERVICE_NAME: worker-service
      INTERNAL_SERVICE_TOKEN: internal_dev_token_change_in_prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: saas_db
      DB_USER: app_user
      DB_PASSWORD: app_password
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: worker-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: saas_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: saas_grafana
    ports:
      - "3005:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  nginx-lb:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway

  node-exporter:
    image: prom/node-exporter:latest
    container_name: saas_node_exporter
    ports:
      - "9100:9100"


volumes:
  postgres_data:
  minio_data:
  grafana_data:


networks:
  default:
    name: saas_network

